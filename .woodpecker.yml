steps:
  - name: lint-php
    image: composer:2
    when:
      - event: [push, pull_request]
    commands:
      - composer install --no-interaction
      - vendor/bin/phpcs --standard=PSR12 lib/

  - name: build-js
    image: node:20-alpine
    when:
      - event: [push, pull_request]
    commands:
      - npm ci
      - npm run lint
      - npm run build

  - name: deploy
    image: bitnami/kubectl:latest
    when:
      - event: push
        branch: main
    commands:
      - POD=$(kubectl get pod -n default -l app=nextcloud -o jsonpath='{.items[0].metadata.name}')
      - kubectl exec -n default $POD -- mkdir -p /var/www/html/custom_apps/crate
      - tar cf - appinfo img lib templates js | kubectl exec -n default -i $POD -- tar xf - -C /var/www/html/custom_apps/crate/
      - kubectl exec -n default $POD -- chown -R www-data:www-data /var/www/html/custom_apps/crate
      - kubectl exec -n default $POD -- php /var/www/html/occ app:disable crate || true
      - kubectl exec -n default $POD -- php /var/www/html/occ app:enable crate
      - kubectl exec -n default $POD -- php /var/www/html/occ upgrade
      - kubectl exec -n default $POD -- apache2ctl graceful
